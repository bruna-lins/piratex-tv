<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filmes mais populares</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/bilheterias.css" />
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="bilheterias.html">Bilheterias</a></li>
        <li><a href="netflix.html">Netflix</a></li>
      </ul>
    </nav>

    <header>
      <h1>Top 5 Bilheterias Mundiais</h1>
      <p>Lista com os filmes de maior arrecadação mundial.</p>
    </header>

    <main>
      <section>
        <h2>Tabela de Bilheterias</h2>

        <div class="controles-dom">
          <button class="botao-dom" type="button" data-limite="3">
            Mostrar Top 3
          </button>
          <button class="botao-dom" type="button" data-limite="5">
            Mostrar Top 5
          </button>
        </div>

        <p class="contador-dom" data-resumo-bilheterias>
          Carregando ranking de bilheterias...
        </p>

        <table border="1">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Ano</th>
              <th>Bilheteria</th>
            </tr>
          </thead>

          <tbody data-tabela-bilheteria></tbody>
        </table>
      </section>
    </main>

    <script src="js/dados.js"></script>
    <script src="js/main.js"></script>
    <script src="js/bilheterias.js"></script>
  </body>
